# # # # # # # # # # # # # # # # # # # # # # #
#                                           #
#        Плагин создан студией             #
#                fcPlugins                  #
#     https://t.me/fcplugins_minecraft      #
#                                           #
# # # # # # # # # # # # # # # # # # # # # # #

chat:
  enabled: true
  prefix: "!"

local-chat:
  radius: 100
  format: "&bⓁ %prefix%{player}%suffix%&b: &f{message}"

global-chat:
  format: "&6Ⓖ %prefix%{player}%suffix%&6: &f{message}"

copy:
  enabled: true
  permission: "fcchat.copy"
  hover-text: "&7[&fНажмите, чтобы скопировать&7]"

world-colors:
  enabled: true
  default-color: "&f"
  worlds:
    world: "&a"
    world_nether: "&c"
    world_the_end: "&6"

color-chat:
  enabled: true
  permission: "fcchat.color"

hidden-text:
  enabled: true
  permission: "fcchat.hidden"
  symbol: "█"
  length: 7

player-info:
  enabled: true
  permission: "fcchat.info"
  lines:
    - "&7[⚠] &fИнформация об игроке&7: %player_name%"
    - "&f"
    - "&7» &fПоследний вход&7: %player_last_played_formatted%"
    - "&7» &fIP адрес&7: %player_ip%"
    - "&7» &fPing&7: %player_ping%"

discord-webhook:
  enabled: false
  url: ""
  username: "Minecraft"
  avatar-url: ""

join-leave-messages:
  enabled: true
  join:
    message: "&a&l+&f %player_name%"
    sound: "ENTITY_PLAYER_LEVELUP"
  leave:
    message: "&c&l-&f %player_name%"
    sound: "ENTITY_PLAYER_LEVELUP"

disabled-worlds:
  - "disableWorld1"
  - "disableWorld2"

commands:
  msg:
    enabled: true
    aliases:
      tell: true
      whisper: true
      w: true
  reply:
    enabled: true
    aliases:
      r: true
  clear:
    enabled: true
  broadcast:
    enabled: true
    aliases:
      bc: true
      announce: true

hologram-messages:
  enabled: false
  duration: 10
  max-words-per-line: 6
  height: 2.5
  format: "&f{message}"

sounds:
  message:
    enabled: true
    sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 0.5
    pitch: 1.0
  ping:
    enabled: true
    sound: "ENTITY_PLAYER_LEVELUP"
    volume: 0.8
    pitch: 1.2
  everyone-ping:
    enabled: true
    sound: "ENTITY_ENDER_DRAGON_GROWL"
    volume: 1.0
    pitch: 0.8

ping-system:
  enabled: true
  symbol: "@"
  permission: "fcchat.ping"
  everyone-permission: "fcchat.ping.everyone"
  ping-color: "&e"
  everyone-ping-color: "&c"
  toast:
    enabled: true
    text: "&fТебя упомянули в чате!"

update-check: true

# Приоритет события для обработки чата
# Доступные значения: LOWEST, LOW, NORMAL, HIGH, HIGHEST, MONITOR
# LOWEST - Обрабатывается первым (до других плагинов)
# LOW - Ранняя обработка
# NORMAL - Стандартная обработка (рекомендуется)
# HIGH - Поздняя обработка
# HIGHEST - Обрабатывается последним (после других плагинов)
# MONITOR - Только наблюдение (нельзя отменять события)
event-priority: "NORMAL"
