private-messages:
  enabled: true
  permission: "fcchat.msg"
  cooldown: 3
  cooldown-message: "&c[✘] &fWait &c{time} &fseconds before sending next message&c!"
  format:
    sender: "&7[&6You &7-> &e{receiver}&7] &f{message}"
    receiver: "&7[&e{sender} &7-> &6You&7] &f{message}"
  sounds:
    sender:
      enabled: true
      sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
      volume: 0.3
      pitch: 1.2
    receiver:
      enabled: true
      sound: "ENTITY_PLAYER_LEVELUP"
      volume: 0.5
      pitch: 1.0

reply:
  enabled: true
  permission: "fcchat.reply"
  cooldown: 3
  cooldown-message: "&c[✘] &fWait &c{time} &fseconds before replying again&c!"
  format:
    sender: "&7[&6You &7-> &e{receiver}&7] &f{message}"
    receiver: "&7[&e{sender} &7-> &6You&7] &f{message}"
  sounds:
    sender:
      enabled: true
      sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
      volume: 0.3
      pitch: 1.2
    receiver:
      enabled: true
      sound: "ENTITY_PLAYER_LEVELUP"
      volume: 0.5
      pitch: 1.0

broadcast:
  enabled: true
  permission: "fcchat.broadcast"
  cooldown: 10
  cooldown-message: "&c[✘] &fWait &c{time} &fseconds before next broadcast&c!"
  format: "&c[&4BROADCAST&c] &7(&f{sender}&7) &f{message}"
  sounds:
    enabled: true
    sound: "ENTITY_ENDER_DRAGON_GROWL"
    volume: 0.8
    pitch: 0.8
