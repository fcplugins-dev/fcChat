mysql:
  enabled: false
  host: "fcchat"
  port: 3306
  database: "database"
  username: "root"
  password: ""
  table-prefix: "fcchat_"

sync:
  enabled: true
  server-name: "server1" # ВАЖНО: укажите уникальное имя на каждом сервере!
  sync-channels:
    - "global" # Пока доступна только синхронизация глобального канала!

# (не рекомендуется изменять)
connection:
  max-pool-size: 10
  connection-timeout: 30000
  idle-timeout: 600000
  max-lifetime: 1800000
