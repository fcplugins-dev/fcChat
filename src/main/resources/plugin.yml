name: fcChat
version: '${project.version}'
main: fc.plugins.fcchat.FcChat
api-version: '1.16'
prefix: fcChat
softdepend: [PlaceholderAPI, LuckPerms]
load: STARTUP
authors: [fcPlugins]
description: Многофункциональный плагин чата
website: https://t.me/fcplugins_minecraft
commands:
  fcchat:
    description: Команда управления плагином
    permission: fcchat.use
  clear:
    description: Команда очистки чата
    permission: fcchat.clear
  channel:
    description: Команда переключения каналов
    permission: fcchat.use
  msg:
    description: Отправить личное сообщение игроку
    permission: fcchat.msg
    aliases: [tell, whisper, w]
  r:
    description: Ответить на последнее личное сообщение
    permission: fcchat.reply
    aliases: [reply]
  broadcast:
    description: Объявить сообщение всем игрокам
    permission: fcchat.broadcast
    aliases: [bc, announce]
permissions:
  fcchat.use:
    description: Позволяет использовать основные команды плагина
    default: true
  fcchat.reload:
    description: Позволяет перезагружать конфигурацию плагина
    default: op
  fcchat.hidden:
    description: Позволяет использовать маскировку сообщений
    default: op
  fcchat.copy:
    description: Позволяет копировать текст из чата
    default: op
  fcchat.color:
    description: Позволяет использовать hex цвета в чате
    default: op
  fcchat.read:
    description: Позволяет просматривать заблокированные сообщения при наведении
    default: op
  fcchat.info:
    description: Позволяет просматривать информацию об игроке при наведении
    default: op
  fcchat.bypass:
    description: Позволяет обходить ограничения плагина
    default: op
  fcchat.clear:
    description: Позволяет очищать чат
    default: op
  fcchat.ping:
    description: Позволяет использовать систему пингов (@игрок)
    default: true
  fcchat.ping.everyone:
    description: Позволяет использовать пинг @everyone
    default: op
  fcchat.channel.admin:
    description: Позволяет использовать админ канал
    default: op
  fcchat.channel.clan:
    description: Позволяет использовать клан канал
    default: true
  fcchat.msg:
    description: Позволяет отправлять личные сообщения
    default: true
  fcchat.reply:
    description: Позволяет отвечать на личные сообщения
    default: true
  fcchat.broadcast:
    description: Позволяет делать объявления
    default: op
  fcchat.ai.manage:
    description: Позволяет управлять AI модератором
    default: op
  fcchat.ai.logger:
    description: Получать сообщения AI логгера модерации
    default: op
  fcchat.action.copy:
    description: Позволяет использовать действие копирования
    default: op
  fcchat.action.paste:
    description: Позволяет использовать действие вставки
    default: op
  fcchat.action.command:
    description: Позволяет использовать действие команды
    default: op
  fcchat.action.url:
    description: Позволяет использовать действие открытия ссылки
    default: op
  fcchat.admin:
    description: Полные права администратора плагина
    default: op
    children:
      fcchat.use: true
      fcchat.reload: true
      fcchat.hidden: true
      fcchat.copy: true
      fcchat.color: true
      fcchat.read: true
      fcchat.info: true
      fcchat.bypass: true
      fcchat.clear: true
      fcchat.ping: true
      fcchat.ping.everyone: true
      fcchat.channel.admin: true
      fcchat.channel.clan: true
      fcchat.msg: true
      fcchat.reply: true
      fcchat.broadcast: true
      fcchat.ai.manage: true
      fcchat.ai.logger: true
      fcchat.action.copy: true
      fcchat.action.paste: true
      fcchat.action.command: true
      fcchat.action.url: true
